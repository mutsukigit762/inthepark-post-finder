<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>in the Park 荻窪 ポスト位置</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --border: #e0ddd7; --text: #1a1917;
    --sub: #8a8780; --key-bg: #eceae5; --key-active: #d4d1ca; --accent: #c8a97a;
    --pink: #c9426b; --yellow: #d4a72c; --dim: #2a2a2a;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg); min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; color: var(--text);
  }
  header {
    width: 100%; padding: 16px 20px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border); text-align: center;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; color: var(--sub); }
  .main {
    width: 100%; max-width: 420px; padding: 20px 16px 40px; flex: 1;
    display: flex; flex-direction: column; justify-content: center; gap: 28px;
  }
  .section-label {
    font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: var(--sub);
    display: block; margin-bottom: 8px;
  }
  .number-display {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; display: flex; align-items: center; justify-content: space-between;
    min-height: 68px;
  }
  .number-value {
    font-size: 36px; font-weight: 300; letter-spacing: 0.06em; color: var(--text);
    font-variant-numeric: tabular-nums; min-width: 120px;
  }
  .number-value.empty { color: var(--border); }
  .clear-btn {
    background: #b0aca5; border: none; color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
  .key {
    background: var(--key-bg); border: none; border-radius: 10px; aspect-ratio: 1.4;
    font-size: 22px; color: var(--text); cursor: pointer; transition: background 0.1s;
    -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center;
  }
  .key:active { background: var(--key-active); }
  .key.key-del { font-size: 18px; color: var(--sub); }
  .key.key-empty { background: transparent; cursor: default; }
  .confirm-btn { width: 100%; margin-top: 8px; padding: 20px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 20px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .result { display: none; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; animation: fadeIn 0.15s ease; padding: 24px;
  }
  .modal-overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .map-wrap {
    background: var(--surface); border-radius: 20px;
    padding: 24px 20px; width: 100%; max-width: 380px;
    animation: popIn 0.15s ease;
  }
  @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .map-caption { text-align: center; margin-bottom: 16px; }
  .map-caption .cap-room { display: block; font-size: 20px; color: var(--sub); margin-bottom: 1px; }
  .map-caption .cap-loc { display: block; font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: 0.03em; }
  .map-caption .cap-within { display: block; font-size: 18px; color: var(--sub); margin-top: 2px; }
  svg { width: 100%; height: auto; display: block; }
  .notfound { text-align: center; padding: 36px 0; color: var(--border); font-size: 14px; }
  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(30,28,26,0.88); color: #fff; font-size: 14px; font-weight: 500;
    padding: 10px 20px; border-radius: 20px; white-space: nowrap;
    animation: toastIn 0.2s ease; z-index: 200;
  }
  .toast.hide { animation: toastOut 0.3s ease forwards; }
  @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(8px); } }
</style>
</head>
<body>
<header>
  <h1>in the Park 荻窪 — ポスト位置</h1>
</header>
<div class="main">
  <div>
    <span class="section-label">部屋番号</span>
    <div class="number-display">
      <span class="number-value empty" id="numDisplay">—</span>
      <button class="clear-btn" onclick="clearNum()" aria-label="クリア">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="4.5" y1="4.5" x2="13.5" y2="13.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="13.5" y1="4.5" x2="4.5" y2="13.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <div class="keypad">
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key key-empty"></button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key key-del" onclick="deleteKey()">⌫</button>
    </div>
    <button class="confirm-btn" onclick="confirm()">検索</button>
  </div>
</div>
<div class="modal-overlay hidden" id="modal" onclick="closeModal()">
  <div id="result" onclick="event.stopPropagation()"></div>
</div>
<script>
const SOUTH_RANGES = {
  14:[1401,1408],13:[1301,1309],12:[1201,1210],11:[1101,1110],
  10:[1001,1012],9:[901,913],8:[801,814],7:[701,716],
  6:[601,617],5:[501,517],4:[401,417],3:[301,317],2:[201,217],1:[101,117]
};
const SEASON_RANGES = {
  12:[1211,1220],11:[1111,1120],10:[1013,1022],9:[914,925],
  8:[815,827],7:[717,731],6:[618,633],5:[518,534],
  4:[418,435],3:[318,333],2:[218,233],1:[118,123]
};
function buildAll() {
  const n = [];
  for (const [a,b] of Object.values(SOUTH_RANGES)) for (let i=a;i<=b;i++) n.push(i);
  for (const [a,b] of Object.values(SEASON_RANGES)) for (let i=a;i<=b;i++) n.push(i);
  n.sort((x,y)=>y-x);
  return n;
}
const ALL = buildAll();
const COLS = 51;
const OFFSET = 4;
const SEGS = [
  {face:'yellow', n:4,  label:'壁面1'},
  {face:'pink',   n:13, label:'壁面2'},
  {face:'yellow', n:3,  label:'壁面3'},
  {face:'pink',   n:13, label:'壁面4'},
  {face:'yellow', n:4,  label:'壁面5'},
  {face:'pink',   n:14, label:'壁面6'},
];
function locate(numStr) {
  const n = parseInt(numStr,10);
  if (isNaN(n)) return null;
  const idx = ALL.indexOf(n);
  if (idx < 0) return null;
  const slot = idx + OFFSET;
  const row = Math.floor(slot/COLS)+1;
  const col = (slot%COLS)+1;
  let acc=0, segIdx=-1, within=0;
  for (let i=0;i<SEGS.length;i++){
    if (col <= acc+SEGS[i].n){ segIdx=i; within=col-acc; break; }
    acc+=SEGS[i].n;
  }
  return { n, row, col, segIdx, within, seg: SEGS[segIdx] };
}
function drawMap(loc) {
  const W = 228, H = 295;
  const SP = 14;
  const xEntry = 18, yBot = 220;
  const xLeftWall = xEntry + 4*SP;   // 74
  const xMidWall  = xLeftWall + 3*SP; // 116
  const xRightWall= xMidWall  + 4*SP; // 172
  const yTop6 = yBot - 14*SP;          // 44
  const yTop  = yBot - 13*SP;          // 58
  const yTop3  = yTop6 + SP/2;          // 51
  const yBot_h = yBot  + SP/2;          // 247
  const segLines = [
    {x1:xEntry,      y1:yBot_h, x2:xLeftWall,  y2:yBot_h},
    {x1:xLeftWall,   y1:yBot,   x2:xLeftWall,  y2:yTop},
    {x1:xLeftWall,   y1:yTop3,  x2:xMidWall,   y2:yTop3},
    {x1:xMidWall,    y1:yTop,   x2:xMidWall,   y2:yBot},
    {x1:xMidWall,    y1:yBot_h, x2:xRightWall, y2:yBot_h},
    {x1:xRightWall,  y1:yBot,   x2:xRightWall, y2:yTop6},
  ];
  const labelPos = [
    {x:46,  y:245},{x:84,  y:125},{x:95,  y:49},
    {x:106, y:125},{x:144, y:245},{x:182, y:125},
  ];
  let cells = '', faceLabels = '';
  segLines.forEach((ln, si) => {
    const seg = SEGS[si];
    const cnt = seg.n;
    const isHitFace = (loc.segIdx === si);
    const lp = labelPos[si];
    faceLabels += `<text x="${lp.x}" y="${lp.y}" fill="${isHitFace ? '#c8a97a' : '#aaa'}" font-size="13" font-weight="${isHitFace ? '700' : '400'}" text-anchor="middle">${si+1}</text>`;
    for (let k=1; k<=cnt; k++){
      const t = (k-0.5)/cnt;
      const cx = ln.x1 + (ln.x2-ln.x1)*t;
      const cy = ln.y1 + (ln.y2-ln.y1)*t;
      const isHit = (loc.segIdx===si && loc.within===k);
      if (isHit){
        cells += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="6" fill="#c8a97a"><animate attributeName="r" values="6;9;6" dur="1.6s" repeatCount="indefinite"/></circle>`;
        cells += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="6" fill="none" stroke="#c8a97a" stroke-width="2"><animate attributeName="r" values="6;22" dur="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="1.6s" repeatCount="indefinite"/></circle>`;
      } else {
        cells += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.5" fill="${isHitFace ? '#c8a97a' : '#d6cfc2'}"/>`;
      }
    }
  });
  return `
  <div class="map-wrap">
    <div class="map-caption"><span class="cap-room"><span style="color:var(--accent);font-weight:700;">${loc.n}</span> 号室のポスト</span><br><span class="cap-loc">${loc.seg.label}</span><span class="cap-within">左から${loc.within}列目 上から${loc.row}段目</span></div>
    <svg viewBox="0 0 ${W} ${H}">
      <line x1="180" y1="24"  x2="214" y2="24"  stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
      <line x1="214" y1="24"  x2="214" y2="283" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
      <line x1="10"  y1="283" x2="214" y2="283" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
      <line x1="10"  y1="283" x2="10"  y2="271" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
      <line x1="8"   y1="271" x2="12"   y2="271" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
      <line x1="10"  y1="244" x2="10"  y2="233" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
      <line x1="8"   y1="244" x2="12"   y2="244" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
      ${faceLabels}${cells}
      <text x="10" y="262" fill="#aaa" font-size="11" font-weight="600" text-anchor="middle">入口</text>
    </svg>
  </div>`;
}
let num = '';
function pressKey(k){ if(num.length>=4) return; num+=k; update(); }
function deleteKey(){ num=num.slice(0,-1); update(); }
function clearNum(){ num=''; update(); }
function closeModal(){
  document.getElementById('modal').classList.add('hidden');
  clearNum();
}
let toastTimer;
function showToast(msg){
  const old = document.querySelector('.toast');
  if (old) old.remove();
  clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  toastTimer = setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, 2000);
}
function confirm(){
  const result = document.getElementById('result');
  const modal = document.getElementById('modal');
  if (!num) return;
  const loc = locate(num);
  if (!loc){ showToast('該当する部屋番号はありません'); return; }
  result.innerHTML = drawMap(loc);
  modal.classList.remove('hidden');
}
function update(){
  const el = document.getElementById('numDisplay');
  const modal = document.getElementById('modal');
  if (num===''){
    el.textContent='—'; el.classList.add('empty');
    modal.classList.add('hidden'); return;
  }
  el.textContent=num; el.classList.remove('empty');
  modal.classList.add('hidden');
}
</script>
</body>
</html>
